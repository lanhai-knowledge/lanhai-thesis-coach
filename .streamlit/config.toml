[theme]
# 對齊 GOV.TW Design System：Blue (hue 240, blue-8 示例 #0062B1)、
# 中性灰（背景與 surface 採 OKLCH neutral-1/-3 概念）、
# 文字採 neutral-12 概念（高對比、過 WCAG 2.2 AA 4.5:1）
primaryColor = "#0062B1"
backgroundColor = "#fafbfc"
secondaryBackgroundColor = "#eef3f7"
textColor = "#1f2937"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
